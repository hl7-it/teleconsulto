    name: Esempi
    description: >-
      Caso d'uso esemplificativo: teleconsulto medico pneumologico (classe TC) erogato il 17/06/2026
      dalla U.O. Pneumologia dell'Ospedale Sandro Pertini (ASL Roma 1). Il Dr. Marco Rossi, medico di 
      Medicina Interna, richiede un teleconsulto con la Dr.ssa Laura Trevisan, Pneumologa, per il sig. 
      Giovanni Bianchi (67 anni, bronchite cronica nota, ex fumatore), a seguito del peggioramento della
      tosse e della dispnea. Il teleconsulto si svolge in modalitГ  sincrona tra i due professionisti, 
      senza la presenza del paziente, sulla base della condivisione della documentazione clinica
      disponibile (anamnesi, esami ematochimici, radiografia del torace e terapia in corso).
      La consultazione ГЁ finalizzata alla valutazione del quadro clinico e alla definizione condivisa 
      del percorso terapeutico.
